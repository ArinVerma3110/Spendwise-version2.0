

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign Up - SpendWise</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">SpendWise</h1>
  </header>

  <main class="container">
    <h1 class="webtitle">Create account</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flashes">
          {% for category, msg in messages %}
            <li class="flash {{ category }}">{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="/signup" method="post" class="auth-form">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" required minlength="6">

      <button type="submit">Sign up</button>
    </form>

    <p style="text-align:center; margin-top:12px;">Already have an account? <a href="/login">Login</a></p>
  </main>
</body>
</html>
